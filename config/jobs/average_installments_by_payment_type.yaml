job_name: average_installments_by_payment_type
source_tables:
  - olist_orders_raw
  - olist_order_items_raw
  - olist_order_payments_raw
  - olist_customers_raw
target_table: gold.average_installments_by_payment_type
transformations:
  - Join olist_orders_raw with olist_order_items_raw on order_id
  - Join the result with olist_order_payments_raw on order_id
  - Join the result with olist_customers_raw on customer_id
  - Group by payment_type and calculate the average of installments
