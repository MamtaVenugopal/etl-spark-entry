job_name: product_category_order_count_monthly
source_tables:
  - olist_orders_raw
  - olist_order_items_raw
  - olist_products_raw
  - olist_category_translation_raw
target_table: gold.product_category_order_count_monthly
transformations:
  - Read olist_orders_raw from bronze
  - Join olist_orders_raw with olist_order_items_raw on order_id
  - Join the result with olist_products_raw on product_id
  - Join the result with olist_category_translation_raw on product_category_name
  - Aggregate the data by product_category_name and month of order_purchase_timestamp
  - Count the number of orders for each product category per month
  - Write the aggregated result to gold.product_category_order_count_monthly in Parquet format
acceptance_criteria:
  - Total order count for each product category per month should be greater than or equal to 0
  - The report should display product categories as rows and months as columns
  - Each cell should contain the total order count for the respective category and month
