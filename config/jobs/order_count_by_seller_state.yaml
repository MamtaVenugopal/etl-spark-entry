job:
  target_table: gold.order_count_by_seller_state
  bronze_tables:
  - olist_orders_raw
  - olist_order_items_raw
  - olist_sellers_raw
  transformations:
  - Join olist_orders_raw to olist_order_items_raw on order_id
  - Join olist_order_items_raw to olist_sellers_raw on seller_id
  acceptance_criteria:
  - SELECT COUNT(*) FROM gold.order_count_by_seller_state WHERE total_orders > 0
  - SELECT seller_state, total_orders FROM gold.order_count_by_seller_state WHERE
    seller_state IS NOT NULL LIMIT 10
  schema_context: '- TABLE olist_sellers_raw (Glue bronze, parquet on S3): Seller
    dimension.. S3: s3://olist-etl-demo/bronze/olist_sellers_raw/. Columns: seller_id,
    seller_zip_code_prefix, seller_city, seller_state. Join keys: seller_id.

    - TABLE olist_order_items_raw (Glue bronze, parquet on S3): Line items per order.
    Links orders, products, sellers.. S3: s3://olist-etl-demo/bronze/olist_order_items_raw/.
    Columns: order_id, order_item_id, product_id, seller_id, shipping_limit_date,
    price, freight_value. Join keys: order_id, product_id, seller_id.

    - TABLE olist_orders_raw (Glue bronze, parquet on S3): Core orders table. One
    row per order.. S3: s3://olist-etl-demo/bronze/olist_orders_raw/. Columns: order_id,
    customer_id, order_status, order_purchase_timestamp, order_approved_at, order_delivered_carrier_date,
    order_delivered_customer_date, order_estimated_delivery_date. Join keys: order_id,
    customer_id.'
airflow_dag_path: dags/order_count_by_seller_state_dag.py
